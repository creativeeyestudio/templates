server {
    listen 80;
    server_name _;

    root /var/www/sites;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ ^/([^/]+)/index\.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/sites/$1/index.php;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/sites$fastcgi_script_name;
    }
}